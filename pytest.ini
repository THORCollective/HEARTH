[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Output options
addopts =
    # Verbose output with test names
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    -ra
    # Strict markers - fail on unknown markers
    --strict-markers
    # Fail on warnings (disabled by default, can enable with -W error)
    # -W error

# Coverage options (when running with --cov)
# Example: pytest --cov=scripts --cov-report=html --cov-report=term
[coverage:run]
source = scripts
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
# Show lines that weren't covered
show_missing = True
# Skip files with 100% coverage in the report
skip_covered = False
# Fail if coverage is below this threshold
# fail_under = 70

[coverage:html]
directory = htmlcov

# Custom markers (also configured in conftest.py)
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    requires_api: marks tests that require API keys

# Minimum Python version
minversion = 3.8

# Console output format
console_output_style = progress

# Disable warnings summary by default (can override with -W)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
