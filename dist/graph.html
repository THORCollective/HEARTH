<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;overflow:hidden;height:100vh}
a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}

/* Header */
.header{background:#161b22;border-bottom:1px solid #30363d;padding:0 20px;display:flex;align-items:center;height:56px;z-index:100;position:relative}
.logo{display:flex;align-items:center;gap:10px;margin-right:32px}
.logo svg{width:28px;height:28px}
.logo-text{font-size:18px;font-weight:700;color:#f0f6fc;letter-spacing:2px}
.nav{display:flex;gap:4px;height:100%}
.nav a{padding:16px 12px;color:#8b949e;font-size:14px;font-weight:500;border-bottom:2px solid transparent;display:flex;align-items:center;transition:color .15s}
.nav a:hover{color:#f0f6fc;text-decoration:none}
.nav a.active{color:#f0f6fc;border-bottom-color:#f97316}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}

/* Stats bar */
.stats-bar{background:#161b22;border-bottom:1px solid #21262d;padding:8px 20px;display:flex;align-items:center;gap:16px;font-size:13px;color:#8b949e;flex-wrap:wrap;z-index:90;position:relative}
.stats-bar .stat{display:flex;align-items:center;gap:4px}
.stats-bar .stat .num{color:#f0f6fc;font-weight:600}
.stats-bar .sep{color:#30363d}

/* Filter bar */
.filter-bar{background:#0d1117;border-bottom:1px solid #21262d;padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;z-index:80;position:relative}
.filter-btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{background:#30363d;border-color:#484f58}
.filter-btn.active{background:#f97316;border-color:#f97316;color:#fff}
.filter-label{color:#8b949e;font-size:12px;margin-right:4px}

/* Main layout */
.main{display:flex;height:calc(100vh - 56px - 37px - 42px);position:relative}
.canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}

/* Controls overlay */
.controls{position:absolute;bottom:16px;right:16px;display:flex;gap:6px;z-index:50}
.ctrl-btn{background:rgba(22,27,34,0.92);border:1px solid #30363d;color:#c9d1d9;width:36px;height:36px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl-btn:hover{background:#30363d;border-color:#484f58}

/* Stats overlay */
.stats-overlay{position:absolute;top:12px;right:12px;background:rgba(22,27,34,0.94);border:1px solid #30363d;border-radius:8px;padding:14px 18px;font-size:12px;z-index:50;min-width:180px}
.stats-overlay h3{font-size:13px;color:#f0f6fc;margin-bottom:8px;font-weight:600}
.stats-overlay .row{display:flex;justify-content:space-between;padding:2px 0;color:#8b949e}
.stats-overlay .row .val{color:#f0f6fc;font-weight:500}
.stats-overlay .divider{border-top:1px solid #21262d;margin:6px 0}

/* Sidebar */
.sidebar{width:0;background:#161b22;border-left:1px solid #30363d;overflow-y:auto;overflow-x:hidden;transition:width .25s ease;flex-shrink:0}
.sidebar.open{width:340px}
.sidebar-inner{padding:20px;width:340px}
.sidebar-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:18px;padding:4px 8px}
.sidebar-close:hover{color:#f0f6fc}
.sidebar h2{font-size:16px;color:#f0f6fc;margin-bottom:12px;padding-right:30px}
.sidebar h3{font-size:13px;color:#8b949e;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.sidebar .tag{display:inline-block;background:#21262d;color:#c9d1d9;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px}
.sidebar .tag.tech{border:1px solid #f97316;color:#f97316}
.sidebar .tag.flame{border:1px solid #a855f7;color:#a855f7}
.sidebar .tag.ember{border:1px solid #60a5fa;color:#60a5fa}
.sidebar .tag.alchemy{border:1px solid #f59e0b;color:#f59e0b}
.sidebar .tag.ds{border:1px solid #22c55e;color:#22c55e}
.sidebar .tag.gap{border:1px solid #ef4444;color:#ef4444}
.sidebar .detail-row{padding:6px 0;font-size:13px;color:#c9d1d9;border-bottom:1px solid #21262d}
.sidebar .detail-label{color:#8b949e;font-size:11px}
.sidebar .cta{display:inline-block;margin-top:16px;background:#f97316;color:#fff;padding:10px 20px;border-radius:6px;font-weight:600;font-size:14px;text-decoration:none;transition:background .15s}
.sidebar .cta:hover{background:#ea580c;text-decoration:none}
.sidebar .gap-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:12px;margin:12px 0;color:#fca5a5;font-size:13px}
.sidebar .hyp-link{display:block;padding:6px 8px;margin:2px 0;background:#21262d;border-radius:4px;color:#c9d1d9;font-size:12px;cursor:pointer;transition:background .15s}
.sidebar .hyp-link:hover{background:#30363d;text-decoration:none}

/* Tooltip */
.tooltip{position:absolute;background:rgba(22,27,34,0.96);border:1px solid #30363d;border-radius:6px;padding:8px 12px;font-size:12px;color:#c9d1d9;pointer-events:none;z-index:200;max-width:300px;display:none;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.tooltip .tt-title{color:#f0f6fc;font-weight:600;margin-bottom:4px}
.tooltip .tt-sub{color:#8b949e;font-size:11px}

/* Legend */
.legend{position:absolute;bottom:16px;left:16px;background:rgba(22,27,34,0.92);border:1px solid #30363d;border-radius:8px;padding:10px 14px;display:flex;gap:14px;z-index:50;font-size:11px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

@media(max-width:768px){
  .nav a span{display:none}
  .sidebar.open{width:280px}
  .sidebar-inner{width:280px}
  .stats-overlay{display:none}
  .legend{flex-wrap:wrap;gap:8px}
  .filter-bar{overflow-x:auto}
}
</style>

// Node sizes

function nodeRadius(n){
  if(n.type==='technique')return TECH_R;

// ═══════════════════════════════════════════════════════
// LAYOUT ENGINE
// ═══════════════════════════════════════════════════════
function layoutGraph(tactic){
  const filteredTechs=[];
  const filteredGaps=[];
  const filteredHyps=[];
  const filteredDS=new Set();
  const filteredEdges=[];
  
  if(tactic==='all'){
    techniques.forEach(t=>filteredTechs.push(t));
    gaps.forEach(g=>filteredGaps.push(g));
    hypotheses.forEach(h=>filteredHyps.push(h));
    dsSet.forEach(d=>filteredDS.add(d));
    edges.forEach(e=>filteredEdges.push(e));
  }else{
    const tacTechs=tacticTechMap[tactic]||new Set();
    techniques.forEach(t=>{if(tacTechs.has(t.id))filteredTechs.push(t)});
    gaps.forEach(g=>{if(tacTechs.has(g.id))filteredGaps.push(g)});
    const techIds=new Set([...filteredTechs.map(t=>t.id),...filteredGaps.map(g=>g.id)]);
    hypotheses.forEach(h=>{if(h.techniques.some(t=>techIds.has(t)))filteredHyps.push(h)});
    const hypIds=new Set(filteredHyps.map(h=>h.id));
    filteredHyps.forEach(h=>{h.datasources.forEach(d=>filteredDS.add(d))});
    edges.forEach(e=>{
      if(e.type==='TARGETS'&&hypIds.has(e.s)&&techIds.has(e.t))filteredEdges.push(e);
      if(e.type==='REQUIRES'&&hypIds.has(e.s)&&filteredDS.has(e.t))filteredEdges.push(e);
    });
  }
  
  const CX=W/2,CY=H/2;
  const totalTechs=filteredTechs.length+filteredGaps.length;
  const totalHyps=filteredHyps.length;
  const totalDS=filteredDS.size;
  
  // Dynamic radii based on count
  const baseR=Math.min(W,H)*0.35;
  const techRadius=baseR*0.4;
  const hypRadius=baseR*0.72;
  const dsRadius=baseR*0.95;
  
  const allNodes=[];
  const positions={};
  
  // Layout techniques + gaps in inner ring
  const allTechNodes=[...filteredTechs,...filteredGaps];
  allTechNodes.forEach((t,i)=>{
    const angle=-Math.PI/2+(2*Math.PI*i/Math.max(allTechNodes.length,1));
    const x=CX+Math.cos(angle)*techRadius;
    const y=CY+Math.sin(angle)*techRadius;
    positions[t.id]={x,y};
    allNodes.push({...t,x,y});
  });
  
  // Layout hypotheses in middle ring, positioned near their target techniques
  // Group hypotheses by their primary technique
  const hypsByTech={};
  filteredHyps.forEach(h=>{
    const primaryTech=h.techniques.find(t=>positions[t])||h.techniques[0];
    if(!hypsByTech[primaryTech])hypsByTech[primaryTech]=[];
    hypsByTech[primaryTech].push(h);
  });
  
  // Place hypotheses near their technique
  let hypIndex=0;
  const placedHyps=new Set();
  Object.entries(hypsByTech).forEach(([techId,hyps])=>{
    const techPos=positions[techId];
    if(!techPos){
      // Fallback: place in ring
      hyps.forEach(h=>{
        if(placedHyps.has(h.id))return;
        const angle=-Math.PI/2+(2*Math.PI*hypIndex/Math.max(totalHyps,1));
        const x=CX+Math.cos(angle)*hypRadius;
        const y=CY+Math.sin(angle)*hypRadius;
        positions[h.id]={x,y};
        allNodes.push({...h,x,y});
        placedHyps.add(h.id);
        hypIndex++;
      });
      return;
    }
    const techAngle=Math.atan2(techPos.y-CY,techPos.x-CX);
    const spread=Math.min(0.5,Math.PI/Math.max(hyps.length,1));
    hyps.forEach((h,i)=>{
      if(placedHyps.has(h.id))return;
      const offset=(i-(hyps.length-1)/2)*spread;
      const angle=techAngle+offset;
      const x=CX+Math.cos(angle)*hypRadius;
      const y=CY+Math.sin(angle)*hypRadius;
      positions[h.id]={x,y};
      allNodes.push({...h,x,y});
      placedHyps.add(h.id);
      hypIndex++;
    });
  });
  
  // Place remaining hypotheses that weren't placed
  filteredHyps.forEach(h=>{
    if(placedHyps.has(h.id))return;
    const angle=-Math.PI/2+(2*Math.PI*hypIndex/Math.max(totalHyps,1));
    const x=CX+Math.cos(angle)*hypRadius;
    const y=CY+Math.sin(angle)*hypRadius;
    positions[h.id]={x,y};
    allNodes.push({...h,x,y});
    hypIndex++;
  });
  
  // Layout datasources in outer ring
  const dsArr=[...filteredDS];
  dsArr.forEach((ds,i)=>{
    const angle=-Math.PI/2+(2*Math.PI*i/Math.max(dsArr.length,1));
    const x=CX+Math.cos(angle)*dsRadius;
    const y=CY+Math.sin(angle)*dsRadius;
    positions[ds]={x,y};
    allNodes.push({id:ds,type:'datasource',label:ds,x,y});
  });
  
  return{nodes:allNodes,edges:filteredEdges,positions,
    stats:{techs:filteredTechs.length,gaps:filteredGaps.length,hyps:totalHyps,ds:totalDS,edges:filteredEdges.length}};
}

// ═══════════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════════
function animateTo(newLayout){
  startPositions={};
  targetPositions={};
  nodes.forEach(n=>{startPositions[n.id]={x:n.x,y:n.y}});
  newLayout.nodes.forEach(n=>{targetPositions[n.id]={x:n.x,y:n.y}});
  nodes=newLayout.nodes;
  edgeList=newLayout.edges;
  animProgress=0;
  animStart=performance.now();
  updateStats(newLayout.stats);
}

function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t}

function updatePositions(){
  if(animProgress>=1)return;
  const elapsed=(performance.now()-animStart)/400;
  animProgress=Math.min(1,elapsed);
  const t=easeInOut(animProgress);
  nodes.forEach(n=>{
    const start=startPositions[n.id];
    const end=targetPositions[n.id];
    if(start&&end){
      n.x=start.x+(end.x-start.x)*t;
      n.y=start.y+(end.y-start.y)*t;
    }else if(end){
      n.x=end.x;n.y=end.y;
    }
  });
}

function worldToScreen(x,y){return{x:x*viewScale+viewX,y:y*viewScale+viewY}}
function screenToWorld(sx,sy){return{x:(sx-viewX)/viewScale,y:(sy-viewY)/viewScale}}

function render(){
  updatePositions();
  ctx.save();
  ctx.clearRect(0,0,W,H);
  
  // Apply view transform
  ctx.translate(viewX,viewY);
  ctx.scale(viewScale,viewScale);
  
  // Draw ring guides
  const CX=W/2,CY=H/2;
  const baseR=Math.min(W,H)*0.35;
  ctx.setLineDash([2,8]);
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1/viewScale;
  [0.4,0.72,0.95].forEach(r=>{
    ctx.beginPath();
    ctx.arc(CX,CY,baseR*r,0,Math.PI*2);
    ctx.stroke();
  });
  ctx.setLineDash([]);
  
  // Draw edges
  edgeList.forEach(e=>{
    const sn=nodes.find(n=>n.id===e.s);
    const tn=nodes.find(n=>n.id===e.t);
    if(!sn||!tn)return;
    ctx.beginPath();
    ctx.moveTo(sn.x,sn.y);
    ctx.lineTo(tn.x,tn.y);
    const isHighlight=hoveredNode&&(hoveredNode.id===e.s||hoveredNode.id===e.t);
    const isSelected=selectedNode&&(selectedNode.id===e.s||selectedNode.id===e.t);
    if(isHighlight||isSelected){
      ctx.strokeStyle=e.type==='TARGETS'?'rgba(168,85,247,0.5)':'rgba(34,197,94,0.4)';
      ctx.lineWidth=2/viewScale;
    }else{
      ctx.strokeStyle=e.type==='TARGETS'?'rgba(168,85,247,0.08)':'rgba(34,197,94,0.06)';
      ctx.lineWidth=1/viewScale;
    }
    ctx.stroke();
  });
  
  // Draw nodes
  nodes.forEach(n=>{
    const r=nodeRadius(n);
    const isHover=hoveredNode&&hoveredNode.id===n.id;
    const isSelected_=selectedNode&&selectedNode.id===n.id;
    const isLinked=selectedNode&&edgeList.some(e=>(e.s===selectedNode.id&&e.t===n.id)||(e.t===selectedNode.id&&e.s===n.id));
    const highlight=isHover||isSelected_||isLinked;
    const dim=selectedNode&&!isSelected_&&!isLinked;
    const alpha=dim?0.25:1;
    
    ctx.globalAlpha=alpha;
    
    if(n.type==='technique'){
      // Orange glow
      if(highlight){
        const glow=ctx.createRadialGradient(n.x,n.y,r-4,n.x,n.y,r+12);
        glow.addColorStop(0,'rgba(249,115,22,0.25)');
        glow.addColorStop(1,'transparent');
        ctx.fillStyle=glow;
        ctx.beginPath();ctx.arc(n.x,n.y,r+12,0,Math.PI*2);ctx.fill();
      }
      ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(249,115,22,0.12)';ctx.fill();
      ctx.strokeStyle='#f97316';ctx.lineWidth=(highlight?2.5:1.5)/viewScale;ctx.stroke();
      // Label
      ctx.font=`bold ${Math.max(9,11/viewScale)}px -apple-system,sans-serif`;
      ctx.fillStyle='#f0f6fc';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.label,n.x,n.y);
    }
    else if(n.type==='gap'){
      // Red glow
      const glow=ctx.createRadialGradient(n.x,n.y,r-4,n.x,n.y,r+16);
      glow.addColorStop(0,'rgba(239,68,68,0.3)');
      glow.addColorStop(1,'transparent');
      ctx.fillStyle=glow;
      ctx.beginPath();ctx.arc(n.x,n.y,r+16,0,Math.PI*2);ctx.fill();
      
      ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(239,68,68,0.1)';ctx.fill();
      ctx.strokeStyle='#ef4444';ctx.lineWidth=(highlight?2.5:1.5)/viewScale;ctx.stroke();
      ctx.font=`bold ${Math.max(8,10/viewScale)}px -apple-system,sans-serif`;
      ctx.fillStyle='#fca5a5';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.label,n.x,n.y);
    }
    else if(n.type==='hypothesis'){
      const colors={f:'#a855f7',e:'#60a5fa',a:'#f59e0b'};
      const color=colors[n.subtype]||'#a855f7';
      if(highlight){
        const glow=ctx.createRadialGradient(n.x,n.y,r-3,n.x,n.y,r+10);
        glow.addColorStop(0,color+'40');
        glow.addColorStop(1,'transparent');
        ctx.fillStyle=glow;
        ctx.beginPath();ctx.arc(n.x,n.y,r+10,0,Math.PI*2);ctx.fill();
      }
      ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.fillStyle=color+'15';ctx.fill();
      ctx.strokeStyle=color;ctx.lineWidth=(highlight?2:1.2)/viewScale;ctx.stroke();
      ctx.font=`bold ${Math.max(8,10/viewScale)}px -apple-system,sans-serif`;
      ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.label,n.x,n.y);
    }
    else if(n.type==='datasource'){
      // Green pill
      ctx.font=`bold ${Math.max(7,9/viewScale)}px -apple-system,sans-serif`;
      const tw=ctx.measureText(n.label).width;
      const pw=tw+14,ph=20;
      ctx.beginPath();
      const rx=n.x-pw/2,ry=n.y-ph/2;
      ctx.roundRect(rx,ry,pw,ph,ph/2);
      ctx.fillStyle=highlight?'rgba(34,197,94,0.2)':'rgba(34,197,94,0.08)';
      ctx.fill();
      ctx.strokeStyle='#22c55e';ctx.lineWidth=(highlight?1.8:1)/viewScale;ctx.stroke();
      ctx.fillStyle='#22c55e';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.label,n.x,n.y);
    }
    
    ctx.globalAlpha=1;
  });
  
  ctx.restore();
  
  if(animProgress<1)requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════
let isDragging=false,dragStartX=0,dragStartY=0,dragStartVX=0,dragStartVY=0;
let lastTouchDist=0;

function getNodeAt(sx,sy){
  const w=screenToWorld(sx,sy);
  for(let i=nodes.length-1;i>=0;i--){
    const n=nodes[i];
    const r=nodeRadius(n)+(n.type==='datasource'?10:0);
    const dx=w.x-n.x,dy=w.y-n.y;
    if(dx*dx+dy*dy<r*r)return n;
  }
  return null;
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  
  if(isDragging){
    viewX=dragStartVX+(e.clientX-dragStartX);
    viewY=dragStartVY+(e.clientY-dragStartY);
    render();
    return;
  }
  
  const node=getNodeAt(mx,my);
  if(node!==hoveredNode){
    hoveredNode=node;
    canvas.style.cursor=node?'pointer':'grab';
    
    const tt=document.getElementById('tooltip');
    if(node){
      const ttTitle=document.getElementById('ttTitle');
      const ttSub=document.getElementById('ttSub');
      if(node.type==='technique'){
        ttTitle.textContent=node.label+' — '+node.name;
        const hyps=techHypMap[node.id]||[];
        ttSub.textContent=hyps.length+' hypotheses targeting this technique';
      }else if(node.type==='gap'){
        ttTitle.textContent='⚠️ '+node.label+' — '+node.name;
        ttSub.textContent='Coverage gap — no HEARTH hypothesis';
      }else if(node.type==='hypothesis'){
        ttTitle.textContent=node.label;
        ttSub.textContent=node.title;
      }else{
        ttTitle.textContent=node.label;
        const linked=[];
        edgeList.forEach(e=>{if(e.t===node.id)linked.push(e.s)});
        ttSub.textContent=linked.length+' hypotheses use this data source';
      }
      tt.style.display='block';
      tt.style.left=Math.min(mx+12,W-250)+'px';
      tt.style.top=(my-40)+'px';
    }else{
      tt.style.display='none';
    }
    render();
  }else if(node){
    const tt=document.getElementById('tooltip');
    tt.style.left=Math.min(mx+12,W-250)+'px';
    tt.style.top=(my-40)+'px';
  }
});

canvas.addEventListener('mousedown',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const node=getNodeAt(mx,my);
  
  if(node){
    selectedNode=node;
    showSidebar(node);
    render();
    return;
  }
  
  isDragging=true;
  dragStartX=e.clientX;dragStartY=e.clientY;
  dragStartVX=viewX;dragStartVY=viewY;
  canvas.style.cursor='grabbing';
});

canvas.addEventListener('mouseup',()=>{isDragging=false;canvas.style.cursor=hoveredNode?'pointer':'grab'});
canvas.addEventListener('mouseleave',()=>{isDragging=false;hoveredNode=null;document.getElementById('tooltip').style.display='none';render()});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const delta=e.deltaY>0?0.9:1.1;
  const newScale=Math.max(0.1,Math.min(5,viewScale*delta));
  // Zoom towards mouse
  viewX=mx-(mx-viewX)*(newScale/viewScale);
  viewY=my-(my-viewY)*(newScale/viewScale);
  viewScale=newScale;
  render();
},{passive:false});

// Touch support
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    const t=e.touches[0];
    const rect=canvas.getBoundingClientRect();
    const mx=t.clientX-rect.left,my=t.clientY-rect.top;
    const node=getNodeAt(mx,my);
    if(node){selectedNode=node;showSidebar(node);render();return}
    isDragging=true;dragStartX=t.clientX;dragStartY=t.clientY;dragStartVX=viewX;dragStartVY=viewY;
  }else if(e.touches.length===2){
    isDragging=false;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    lastTouchDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    const t=e.touches[0];
    viewX=dragStartVX+(t.clientX-dragStartX);
    viewY=dragStartVY+(t.clientY-dragStartY);
    render();
  }else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastTouchDist>0){
      const delta=dist/lastTouchDist;
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const rect=canvas.getBoundingClientRect();
      const mx=cx-rect.left,my=cy-rect.top;
      const newScale=Math.max(0.1,Math.min(5,viewScale*delta));
      viewX=mx-(mx-viewX)*(newScale/viewScale);
      viewY=my-(my-viewY)*(newScale/viewScale);
      viewScale=newScale;
      render();
    }
    lastTouchDist=dist;
  }
},{passive:false});

canvas.addEventListener('touchend',()=>{isDragging=false;lastTouchDist=0});

// ═══════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════
function showSidebar(node){
  const sb=document.getElementById('sidebar');
  const content=document.getElementById('sidebarContent');
  sb.classList.add('open');
  
  let html='';
  
  if(node.type==='technique'){
    const hyps=(techHypMap[node.id]||[]).map(id=>hypMap[id]).filter(Boolean);
    const dss=new Set();
    hyps.forEach(h=>h.datasources.forEach(d=>dss.add(d)));
    html=`<h2>${node.label}</h2>
      <div class="detail-row"><div class="detail-label">Technique Name</div>${node.name}</div>
      <div class="detail-row"><div class="detail-label">ATT&CK Link</div><a href="https://attack.mitre.org/techniques/${node.id.replace('.','/')}/" target="_blank">View on MITRE ATT&CK ↗</a></div>
      <h3>Hypotheses (${hyps.length})</h3>
      ${hyps.map(h=>`<a class="hyp-link" onclick="selectNodeById('${h.id}')"><span class="tag ${h.subtype==='f'?'flame':h.subtype==='e'?'ember':'alchemy'}">${h.id}</span> ${h.title.substring(0,60)}${h.title.length>60?'...':''}</a>`).join('')}
      ${hyps.length===0?'<div class="gap-msg">⚠️ No HEARTH hypothesis covers this technique yet!</div><a class="cta" href="submit.html">Submit a Hunt →</a>':''}
      <h3>Data Sources (${dss.size})</h3>
      ${[...dss].map(d=>`<span class="tag ds">${d}</span>`).join(' ')}`;
  }
  else if(node.type==='gap'){
    html=`<h2>⚠️ ${node.label}</h2>
      <div class="detail-row"><div class="detail-label">Technique Name</div>${node.name}</div>
      <div class="detail-row"><div class="detail-label">ATT&CK Link</div><a href="https://attack.mitre.org/techniques/${node.id.replace('.','/')}/" target="_blank">View on MITRE ATT&CK ↗</a></div>
      <div class="gap-msg">🔴 <strong>Coverage Gap!</strong><br>No HEARTH hypothesis covers this technique yet. This is a commonly attacked technique that needs hunting coverage.</div>
      <a class="cta" href="submit.html">Submit a Hunt →</a>`;
  }
  else if(node.type==='hypothesis'){
    const typeNames={f:'🔥 Flame (hypothesis-driven)',e:'🪨 Ember (baseline)',a:'⚗️ Alchemy (model-assisted)'};
    html=`<h2>${node.label}</h2>
      <div class="detail-row"><div class="detail-label">Type</div>${typeNames[node.subtype]||node.subtype}</div>
      <div class="detail-row"><div class="detail-label">Hypothesis</div>${node.title}</div>
      <div class="detail-row"><div class="detail-label">Tactic</div>${(node.tactics||[]).join(', ')}</div>
      <div class="detail-row"><div class="detail-label">Submitter</div>${node.submitter||'—'}</div>
      <div class="detail-row"><div class="detail-label">Tags</div>${(node.tags||'').split(' ').filter(t=>t.startsWith('#')).map(t=>`<span class="tag">${t}</span>`).join(' ')}</div>
      <h3>Techniques (${(node.techniques||[]).length})</h3>
      ${(node.techniques||[]).map(t=>`<a class="hyp-link" onclick="selectNodeById('${t}')"><span class="tag tech">${t}</span> ${techName(t)}</a>`).join('')}
      <h3>Data Sources (${(node.datasources||[]).length})</h3>
      ${(node.datasources||[]).map(d=>`<span class="tag ds">${d}</span>`).join(' ')||'<span style="color:#8b949e">None specified</span>'}`;
  }
  else if(node.type==='datasource'){
    const linkedHyps=[];
    edgeList.forEach(e=>{if(e.t===node.id&&e.type==='REQUIRES'){const h=hypMap[e.s];if(h)linkedHyps.push(h)}});
    const linkedTechs=new Set();
    linkedHyps.forEach(h=>(h.techniques||[]).forEach(t=>linkedTechs.add(t)));
    html=`<h2>📊 ${node.label}</h2>
      <div class="detail-row"><div class="detail-label">Type</div>Data Source</div>
      <h3>Used by Hypotheses (${linkedHyps.length})</h3>
      ${linkedHyps.map(h=>`<a class="hyp-link" onclick="selectNodeById('${h.id}')"><span class="tag ${h.subtype==='f'?'flame':h.subtype==='e'?'ember':'alchemy'}">${h.id}</span> ${(h.title||'').substring(0,60)}</a>`).join('')}
      <h3>Related Techniques (${linkedTechs.size})</h3>
      ${[...linkedTechs].map(t=>`<a class="hyp-link" onclick="selectNodeById('${t}')"><span class="tag tech">${t}</span> ${techName(t)}</a>`).join('')}`;
  }
  
  content.innerHTML=html;
  setTimeout(()=>render(),50);
}

window.selectNodeById=function(id){
  const node=nodes.find(n=>n.id===id);
  if(node){selectedNode=node;showSidebar(node);render()}
};

document.getElementById('sidebarClose').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.remove('open');
  selectedNode=null;
  setTimeout(()=>{resize();render()},260);
});

// Click outside to deselect
canvas.addEventListener('dblclick',()=>{
  selectedNode=null;
  document.getElementById('sidebar').classList.remove('open');
  setTimeout(()=>{resize();render()},260);
});

// ═══════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════
document.getElementById('btnFit').addEventListener('click',()=>{
  viewX=0;viewY=0;viewScale=1;render();
});
document.getElementById('btnZoomIn').addEventListener('click',()=>{
  const cx=W/2,cy=H/2;
  const newScale=Math.min(5,viewScale*1.3);
  viewX=cx-(cx-viewX)*(newScale/viewScale);
  viewY=cy-(cy-viewY)*(newScale/viewScale);
  viewScale=newScale;render();
});
document.getElementById('btnZoomOut').addEventListener('click',()=>{
  const cx=W/2,cy=H/2;
  const newScale=Math.max(0.1,viewScale/1.3);
  viewX=cx-(cx-viewX)*(newScale/viewScale);
  viewY=cy-(cy-viewY)*(newScale/viewScale);
  viewScale=newScale;render();
});

// ═══════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════
filterBar.addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  filterBar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeTactic=btn.dataset.tactic;
  selectedNode=null;
  document.getElementById('sidebar').classList.remove('open');
  viewX=0;viewY=0;viewScale=1;
  setTimeout(()=>{
    resize();
    const layout=layoutGraph(activeTactic);
    animateTo(layout);
    requestAnimationFrame(function loop(){render();if(animProgress<1)requestAnimationFrame(loop)});
  },50);
});

// ═══════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════
function updateStats(s){
  const totalTech=s.techs+s.gaps;
  const covPct=totalTech>0?Math.round(s.techs/totalTech*100):0;
  document.getElementById('statHyp').textContent=s.hyps;
  document.getElementById('statTech').textContent=totalTech;
  document.getElementById('statDS').textContent=s.ds;
  document.getElementById('statGaps').textContent=s.gaps;
  document.getElementById('statCovPct').textContent=covPct+'%';
  document.getElementById('soEdges').textContent=s.edges;
  document.getElementById('soCov').textContent=covPct+'%';
  
  // Count subtypes in current view
  let fc=0,ec=0,ac=0;
  nodes.forEach(n=>{if(n.type==='hypothesis'){if(n.subtype==='f')fc++;else if(n.subtype==='e')ec++;else if(n.subtype==='a')ac++}});
  document.getElementById('soFlames').textContent=fc;
  document.getElementById('soEmbers').textContent=ec;
  document.getElementById('soAlchemy').textContent=ac;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
const initialLayout=layoutGraph('all');
nodes=initialLayout.nodes;
edgeList=initialLayout.edges;
updateStats(initialLayout.stats);
render();
</script>
