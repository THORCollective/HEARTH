name: Update Hunt Database

on:
  push:
    branches:
      - main
    paths:
      - 'Flames/**/*.md'
      - 'Embers/**/*.md'
      - 'Alchemy/**/*.md'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: update-hunt-database
  cancel-in-progress: false

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git dates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update hunt database
        run: |
          echo "::group::Update hunt database"
          python scripts/build_hunt_database.py
          echo "::notice::Database updated successfully"
          echo "::endgroup::"

      - name: Check for database changes
        id: check_changes
        run: |
          if git diff --quiet database/hunts.db; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::debug::No changes to database"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "::notice::Database has changes"
          fi

      - name: Commit and push database
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "::group::Commit and push database"
          git config user.name "hearthbot"
          git config user.email "hearthbot@users.noreply.github.com"
          git add database/hunts.db
          git commit -m "chore: update hunt database

          - Updated from hunt files in Flames/, Embers/, Alchemy/
          - Database contains $(sqlite3 database/hunts.db 'SELECT COUNT(*) FROM hunts') hunts
          - Auto-generated by update-hunt-database workflow"

          # Retry push with rebase in case of concurrent updates
          for i in 1 2 3; do
            git push && break
            echo "::warning::Push failed (attempt $i), pulling and retrying..."
            git pull --rebase origin main
            sleep 2
          done
          echo "::notice::Database committed and pushed successfully"
          echo "::endgroup::"

      - name: Database statistics
        run: |
          echo "::group::Database Statistics"
          TOTAL_HUNTS=$(sqlite3 database/hunts.db "SELECT COUNT(*) FROM hunts")
          UNIQUE_TACTICS=$(sqlite3 database/hunts.db "SELECT COUNT(DISTINCT tactic) FROM hunts WHERE tactic IS NOT NULL")
          UNIQUE_TECHNIQUES=$(sqlite3 database/hunts.db "SELECT COUNT(DISTINCT technique) FROM hunts WHERE technique IS NOT NULL")
          echo "::notice::Total Hunts: $TOTAL_HUNTS"
          echo "::notice::Unique Tactics: $UNIQUE_TACTICS"
          echo "::notice::Unique Techniques: $UNIQUE_TECHNIQUES"
          echo "::endgroup::"
