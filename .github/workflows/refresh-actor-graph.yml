name: Refresh Actor Coverage Data

# Monthly refresh of the MITRE-derived actor coverage data:
#   - public/mitre-matrix.json        (tactics + techniques, from ATT&CK STIX)
#   - public/context-graph-data.json  (actor → technique profiles, mitre_techniques)
#
# This pulls newer MITRE ATT&CK attributions and picks up newly-relevant actors.
# It deliberately does NOT run Phase 1 (enrich-context-graph.cjs): that rebuilds
# the hunt/technique core from hunt-markdown tags, which currently under-counts
# techniques (~12 vs the 101 in the committed graph) and would collapse coverage.
# Phase 2a runs on top of the existing committed graph, preserving the technique
# universe while refreshing the actor layer.
#
# Note: Phase 2a's merge is additive — it adds new actors but never removes ones
# that stop being relevant, so the actor set can drift slowly over time.

on:
  schedule:
    # 07:17 UTC on the 1st of each month (off the top-of-hour to avoid runner contention)
    - cron: "17 7 1 * *"
  workflow_dispatch: # allow manual runs from the Actions tab

concurrency:
  group: refresh-actor-graph
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download MITRE ATT&CK enterprise STIX
        run: |
          mkdir -p data
          curl -fsSL \
            "https://raw.githubusercontent.com/mitre/cti/master/enterprise-attack/enterprise-attack.json" \
            -o data/enterprise-attack.json
          echo "Downloaded $(du -h data/enterprise-attack.json | cut -f1) of STIX data"

      - name: Rebuild MITRE matrix (tactics + techniques)
        run: python scripts/build_mitre_matrix.py

      - name: Refresh actor profiles (Phase 2a)
        run: node scripts/enrich-phase2a.cjs

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet public/mitre-matrix.json public/context-graph-data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to actor coverage data"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Actor coverage data changed"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "hearthbot"
          git config user.email "hearthbot@users.noreply.github.com"
          git add public/mitre-matrix.json public/context-graph-data.json
          git commit -m "chore: refresh actor coverage data from MITRE ATT&CK

          - Rebuilt mitre-matrix.json + context-graph-data.json actor profiles
          - Auto-generated by refresh-actor-graph workflow"

          # Retry push with rebase in case of concurrent updates
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i), pulling and retrying..."
            git pull --rebase origin main
            sleep 2
          done
